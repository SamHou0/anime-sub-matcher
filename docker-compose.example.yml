version: '3.8'

services:
  anime-sub-matcher:
    build: .
    container_name: anime-sub-matcher
    ports:
      - "5000:5000"
    volumes:
      # 示例配置: 将你的剧集目录挂载到容器内的 /app/bangumi
      # 请根据实际情况修改路径
      
      # Linux示例:
      - /mnt/nas/anime:/app/bangumi
      
      # Windows示例 (取消下面的注释并注释上面的):
      # - D:/Media/Bangumi:/app/bangumi
      
      # macOS示例 (取消下面的注释并注释上面的):
      # - /Users/yourname/Movies/Anime:/app/bangumi
      
      # 临时上传目录
      - ./uploads:/app/uploads
    environment:
      - FLASK_ENV=production
    restart: unless-stopped

# 使用步骤:
# 1. 复制此文件为 docker-compose.yml (或直接编辑 docker-compose.yml)
# 2. 修改上面的挂载路径为你的实际剧集目录
# 3. 构建并启动: docker-compose up -d
# 4. 查看日志: docker-compose logs -f
# 5. 访问应用: http://localhost:5000
# 6. 停止应用: docker-compose down
#
# 端口说明:
# - 如需修改访问端口，修改 ports 配置，例如: "8080:5000" 表示通过8080端口访问
#
# 目录结构要求:
# 你的剧集目录应该遵循以下结构:
# bangumi/
# ├── 剧集名称/
# │   ├── Season 01/
# │   │   ├── 视频文件.mkv
# │   │   └── ...
# │   └── Season 02/
# │       └── ...
# └── ...
